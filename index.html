<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Management Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <link href="https://cdn.tailwindcss.com" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/@fortawesome/fontawesome-free@6.1.1/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/@fortawesome/fontawesome-free@6.1.1/css/fontawesome.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/lucide@1.6.10/dist/lucide.css">
</head>
<body class="h-screen bg-gradient-to-b from-gray-900 to-gray-800 text-gray-100">
    <script type="text/babel">
        const { useState, useEffect } = React;
        const { createRoot } = ReactDOM;
        
        const App = () => {
            const [projects, setProjects] = useState([
                { id: 1, title: 'Project 1', tasks: ['Task 1', 'Task 2', 'Task 3'], progress: 30 },
                { id: 2, title: 'Project 2', tasks: ['Task 4', 'Task 5', 'Task 6'], progress: 60 },
                { id: 3, title: 'Project 3', tasks: ['Task 7', 'Task 8', 'Task 9'], progress: 90 }
            ]);
            const [dragging, setDragging] = useState(null);
            const [teamMembers, setTeamMembers] = useState([
                { id: 1, name: 'John Doe', role: 'Project Manager' },
                { id: 2, name: 'Jane Doe', role: 'Developer' },
                { id: 3, name: 'Bob Smith', role: 'Designer' }
            ]);
            
            const handleDragStart = (event, project) => {
                setDragging(project);
            };
            
            const handleDragOver = (event, project) => {
                event.preventDefault();
            };
            
            const handleDrop = (event, project) => {
                if (dragging) {
                    const updatedProjects = projects.map(p => {
                        if (p.id === project.id) {
                            return { ...p, tasks: [...p.tasks, ...dragging.tasks] };
                        }
                        return p;
                    });
                    setProjects(updatedProjects);
                    setDragging(null);
                }
            };
            
            return (
                <div class="flex h-screen">
                    <aside class="bg-gray-900 w-64 p-4 shadow-lg shadow-gray-900/50">
                        <nav>
                            <ul>
                                <li><a href="#" class="block py-2 px-4 hover:bg-gray-800">Dashboard</a></li>
                                <li><a href="#" class="block py-2 px-4 hover:bg-gray-800">Projects</a></li>
                                <li><a href="#" class="block py-2 px-4 hover:bg-gray-800">Team Members</a></li>
                            </ul>
                        </nav>
                    </aside>
                    <main class="flex-1 p-4 overflow-y-auto">
                        <h1 class="text-3xl font-bold mb-4">Project Management Dashboard</h1>
                        <section class="grid grid-cols-1 gap-4 mb-8">
                            {projects.map(project => (
                                <div
                                    key={project.id}
                                    draggable
                                    onDragStart={event => handleDragStart(event, project)}
                                    onDragOver={event => handleDragOver(event, project)}
                                    onDrop={event => handleDrop(event, project)}
                                    class="bg-gray-800 p-4 rounded-lg shadow-lg shadow-gray-900/50"
                                >
                                    <h2 class="text-lg font-bold mb-2">{project.title}</h2>
                                    <ul>
                                        {project.tasks.map(task => (
                                            <li key={task} class="py-2 border-b border-gray-900/50">{task}</li>
                                        ))}
                                    </ul>
                                </div>
                            ))}
                        </section>
                        <section class="grid grid-cols-1 gap-4 mb-8">
                            <h2 class="text-lg font-bold mb-2">Team Members</h2>
                            <ul>
                                {teamMembers.map(member => (
                                    <li key={member.id} class="py-2 border-b border-gray-900/50">{member.name} ({member.role})</li>
                                ))}
                            </ul>
                        </section>
                        <section class="grid grid-cols-1 gap-4">
                            <h2 class="text-lg font-bold mb-2">Analytics</h2>
                            <div class="bg-gray-800 p-4 rounded-lg shadow-lg shadow-gray-900/50">
                                <canvas
                                    class="w-full h-64"
                                    data-chart='{
                                        "type": "line",
                                        "data": {
                                            "labels": ["January", "February", "March", "April", "May"],
                                            "datasets": [
                                                {
                                                    "label": "Project 1",
                                                    "data": [10, 20, 30, 40, 50],
                                                    "borderColor": "rgba(255, 99, 132, 1)",
                                                    "borderWidth": 2
                                                },
                                                {
                                                    "label": "Project 2",
                                                    "data": [20, 30, 40, 50, 60],
                                                    "borderColor": "rgba(54, 162, 235, 1)",
                                                    "borderWidth": 2
                                                }
                                            ]
                                        },
                                        "options": {
                                            "scales": {
                                                "y": {
                                                    "beginAtZero": true
                                                }
                                            }
                                        }
                                    }'
                                />
                            </div>
                        </section>
                    </main>
                </div>
            );
        };
        
        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <div id="root"></div>
</body>
</html>
